services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel run
    user: "65532:65532"
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - ai-stack
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    volumes:
      - ./data/portainer:/data
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "8000"
      - "9443"
    ports:
      - "9000:9000"
    networks:
      - ai-stack
    restart: unless-stopped

  llama-server:
    container_name: llama
    build:
      context: .
      args:
        LLAMACPP_REF: ${LLAMACPP_REF:-master}
        # 89 = RTX 4060 Ti (Ada). Add others e.g. "86;89" if needed.
        CUDA_ARCH: ${CUDA_ARCH:-89}
    image: llamacpp-turboquant:local
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    env_file: .env
    networks:
      - ai-stack
    volumes:
      - models:/models
    # GPU access via NVIDIA Container Toolkit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    command: >
      llama-server
      -hf ${MODEL_HF}
      --host 0.0.0.0 --port 8080
      --parallel 2
      --ctx-size ${CTX_SIZE:-32768}
      --n-gpu-layers ${N_GPU_LAYERS:-99}
      --n-cpu-moe ${N_CPU_MOE:-18}
      --batch-size ${BATCH_SIZE:-4096}
      --ubatch-size ${UBATCH_SIZE:-2048}
      --cache-type-k ${CACHE_TYPE_K:-q8_0}
      --cache-type-v ${CACHE_TYPE_V:-q8_0}
      --temp ${TEMP:-0.7}
      --top-p ${TOP_P:-0.95}
      --top-k ${TOP_K:-20}
      ${EXTRA_ARGS:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 600s

volumes:
  models:

networks:
  ai-stack:
    name: aistack
