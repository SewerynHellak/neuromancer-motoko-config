services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel run
    user: "65532:65532"
    environment:
      # Token lives in .env (gitignored), not inlined. ROTATE the old one in
      # Cloudflare Zero Trust -> Networks -> Tunnels; it was exposed in plaintext.
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - ai-stack
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    volumes:
      - ./data/portainer:/data
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "8000"
      - "9443"
    ports:
      - "9000:9000"
    # On ai-stack so cloudflared can route the tunnel to it (was on `default`,
    # which left it unreachable from the tunnel).
    networks:
      - ai-stack
    restart: unless-stopped

  # Single Gemma model on GPU0 (AtomicBot TurboQuant fork) handling BOTH text and
  # images. Frontend + cloudflared point here (:8080). NOTE: vision is enabled (no
  # --no-mmproj in EXTRA_ARGS), so the server disables --cache-reuse -> expect some
  # per-turn prompt reprocessing. This is the accepted tradeoff for one multimodal
  # model. To get cache-reuse back, switch to the text-only + GPU1 router setup.
  llama-server:
    container_name: llama
    build:
      context: .
      args:
        LLAMACPP_REPO: ${LLAMACPP_REPO:-https://github.com/AtomicBot-ai/atomic-llama-cpp-turboquant.git}
        LLAMACPP_REF: ${LLAMACPP_REF:-feature/turboquant-kv-cache}
        CUDA_ARCH: ${CUDA_ARCH:-89}   # 89 = RTX 4060 Ti (Ada)
    image: llamacpp-turboquant:local
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    env_file: .env
    networks:
      - ai-stack
    volumes:
      - models:/models            # HF cache + downloaded GGUFs persist here
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0'] # RTX 4060 Ti
              capabilities: [gpu]
    command: >
      llama-server
      -hf ${MODEL_HF}
      --host 0.0.0.0 --port 8080
      --ctx-size ${CTX_SIZE:-32768}
      --n-gpu-layers ${N_GPU_LAYERS:-99}
      --n-cpu-moe ${N_CPU_MOE:-18}
      --batch-size ${BATCH_SIZE:-4096}
      --ubatch-size ${UBATCH_SIZE:-2048}
      --cache-type-k ${CACHE_TYPE_K:-q8_0}
      --cache-type-v ${CACHE_TYPE_V:-q8_0}
      --temp ${TEMP:-0.7}
      --top-p ${TOP_P:-0.95}
      --top-k ${TOP_K:-20}
      ${EXTRA_ARGS:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 600s          # first run downloads the model (slow)

volumes:
  models:

networks:
  ai-stack:
    name: aistack_ai-stack
